name: Build (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ARM64]

    env:
      SOLUTION: WinXShell_VS2015.sln

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "${env:SOLUTION}"

      - name: Build solution
        run: |
          msbuild "${env:SOLUTION}" /p:Configuration=Release /p:Platform=${{ matrix.arch }} /m

      - name: Collect binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path output -Force | Out-Null

          # Adjust if needed, but this is safer than blind recursion
          Get-ChildItem -Recurse -Include *.exe,*.dll |
            Where-Object { $_.FullName -match "\\Release\\" -and $_.FullName -match "${{ matrix.arch }}" } |
            Copy-Item -Destination output -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SbieShell-${{ matrix.arch }}
          path: output
